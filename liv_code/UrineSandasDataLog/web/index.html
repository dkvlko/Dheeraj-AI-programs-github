<!DOCTYPE html>
<html>
<head>
    <title>Adaptive WebRTC Stream</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        video { width: 100%; height: auto; max-height: 90vh; background: #222; }
        #info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline controls muted></video>
    <div id="info">Detecting client...</div>
    <button onclick="startStream()" id="startBtn" style="padding: 10px 20px;">Start Stream</button>

    <script>
        var pc = null;

        async function startStream() {
            document.getElementById('startBtn').style.display = 'none';
            
            // 1. Detect Client Properties
            const width = window.innerWidth;
            const height = window.innerHeight;
            const isIPad = /iPad/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const orientation = width > height ? "landscape" : "portrait";
            
            document.getElementById('info').innerText = `Client: ${isIPad ? "iPad" : "Browser"} | ${orientation} (${width}x${height})`;

            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.ontrack = (evt) => {
                document.getElementById('video').srcObject = evt.streams[0];
            };

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // 2. Send dimensions and browser info to FastAPI
            const response = await fetch('/offer', {
                method: 'POST',
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type,
                    width: width,
                    height: height,
                    browser: navigator.userAgent
                }),
                headers: { 'Content-Type': 'application/json' }
            });

            const answer = await response.json();
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    </script>
</body>
</html>
