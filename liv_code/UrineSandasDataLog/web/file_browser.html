<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <title>Ubuntu File Browser</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        a {
            text-decoration: none;
            color: #1565c0;
        }

        a:hover {
            text-decoration: underline;
        }

        .dir {
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            padding: 5px 0;
        }

        .topbar {
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 14px;
            background: #1565c0;
            color: white;
            border-radius: 6px;
            margin-right: 10px;
        }

        .back-btn:hover {
            background: #0d47a1;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="topbar">

        <!-- Back to main / handler -->
        <a class="back-btn" href="/">🏠 Home</a>

        {% if parent %}
            <a class="back-btn" href="{{ parent }}">⬅ Parent</a>
        {% endif %}

    </div>

    <h2>
        Index of {{ current_path }}
    </h2>

    <hr>

    <ul>

        {% for item in items %}

            <li>

                {% if item.is_dir %}

                    📁
                    <a class="dir" href="{{ item.url }}">
                        {{ item.name }}/
                    </a>

                {% else %}

                    📄
                    <a href="{{ item.url }}">
                        {{ item.name }}
                    </a>

                {% endif %}

            </li>

        {% endfor %}

    </ul>

</div>

</body>
</html>
