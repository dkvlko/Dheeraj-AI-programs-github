<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif;">

<!-- Video Area (top 75%) -->
<div style="height:75vh; background:black;">
    <iframe src="/your-existing-stream-page"
            style="width:100%; height:100%; border:none;"></iframe>
</div>

<!-- Controls (bottom 25%) -->
<div style="height:25vh; display:flex; justify-content:space-around; align-items:center; background:#222; color:white;">

    <!-- Touchpad -->
    <div style="text-align:center;">
        <div id="pad"
             style="width:180px; height:120px; background:#444; border-radius:10px; touch-action:none;">
        </div>
        <p>Touchpad</p>
    </div>

    <!-- Buttons -->
    <div style="text-align:center;">
        <button onclick="leftClick()">Left</button>
        <button onclick="rightClick()">Right</button>
        <br><br>
        X: <input id="dx" type="number" value="0" style="width:60px;">
        Y: <input id="dy" type="number" value="0" style="width:60px;">
        <br><br>
        <button onclick="move()">Move</button>
    </div>

</div>

<!-- DEBUG PANEL -->
<div id="debugPanel"
     style="position:fixed; bottom:0; left:0; width:100%;
            background:black; color:lime; font-size:12px;
            padding:5px; display:none;">
</div>

<!-- DEBUG TOGGLE -->
<button onclick="toggleDebug()"
        style="position:fixed; top:5px; right:5px; z-index:999;">
    Debug
</button>

<script>

// -------- DEBUG SYSTEM --------
let DEBUG = false;

function toggleDebug() {
    DEBUG = !DEBUG;
    document.getElementById("debugPanel").style.display = DEBUG ? "block" : "none";
}

function dbg(msg) {
    if (!DEBUG) return;
    document.getElementById("debugPanel").innerText = msg;
}

// -------- WebSocket --------
const ws = new WebSocket("wss://" + location.host + "/ws");

ws.onopen = () => {
    dbg("WebSocket Connected");
};

ws.onerror = () => {
    dbg("WebSocket Error");
};

ws.onclose = () => {
    dbg("WebSocket Closed");
};

ws.onmessage = (e) => {
    dbg("Server: " + e.data);
};


// -------- Touchpad --------
let lastX=null, lastY=null;
let moveCount = 0;

const pad = document.getElementById("pad");

pad.addEventListener("touchstart", e=>{
    const t=e.touches[0];
    lastX=t.clientX;
    lastY=t.clientY;

    dbg("Touch start");
});

pad.addEventListener("touchmove", e=>{
    e.preventDefault();

    const t=e.touches[0];

    let dx=t.clientX-lastX;
    let dy=t.clientY-lastY;

    lastX=t.clientX;
    lastY=t.clientY;

    // ignore tiny noise
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;

    moveCount++;

    ws.send(JSON.stringify({
        action:"move",
        dx:dx,
        dy:dy
    }));

    // update debug every 10 events
    if (moveCount % 10 === 0) {
        dbg(`dx:${dx}, dy:${dy}, moves:${moveCount}`);
    }
});

pad.addEventListener("touchend", ()=>{
    ws.send(JSON.stringify({action:"left_click"}));
    dbg("Tap → Left Click");
});


// -------- Buttons --------
function leftClick(){
    ws.send(JSON.stringify({action:"left_click"}));
    dbg("Left Click");
}

function rightClick(){
    ws.send(JSON.stringify({action:"right_click"}));
    dbg("Right Click");
}

function move(){
    let dx=parseInt(document.getElementById("dx").value);
    let dy=parseInt(document.getElementById("dy").value);

    ws.send(JSON.stringify({
        action:"move",
        dx:dx,
        dy:dy
    }));

    dbg(`Manual move dx:${dx}, dy:${dy}`);
}

</script>

</body>
</html>
