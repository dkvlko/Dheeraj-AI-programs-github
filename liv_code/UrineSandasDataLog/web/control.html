<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif;">

<!-- Top Frame -->
<div style="height:75vh; background:black;">
    <iframe src="/web/stream.html"
            style="width:100%; height:100%; border:none;"></iframe>
</div>

<!-- Bottom Frame (Cleaned) -->
<div style="
    height:25vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#222;
">

    <textarea id="pad-text"
        placeholder="Enter text..."
        style="
            width:95%;
            height:70%;
            resize:none;
            border-radius:8px;
            border:none;
            padding:10px;
            font-size:16px;
            box-sizing:border-box;
        "></textarea>

    <button onclick="submitPadText()"
        style="
            margin-top:10px;
            width:clamp(120px, 30vw, 220px);
            height:clamp(38px, 6vh, 60px);
            border:none;
            border-radius:10px;
            background:#0a84ff;
            color:white;
            font-weight:bold;
            font-size:clamp(14px, 2.5vw, 18px);
        ">
        Submit
    </button>
</div>

<script>

// Keep only WebSocket required for text submission
const ws = new WebSocket("wss://" + location.host + "/ws");

function submitPadText() {
    const text = document.getElementById("pad-text").value;

    console.log("Submitted:", text);

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            action: "text_submit",
            value: text
        }));
    }

    document.getElementById("pad-text").value = "";
}

</script>

</body>
</html>
