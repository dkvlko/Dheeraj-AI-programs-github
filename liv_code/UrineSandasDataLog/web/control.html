<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif;">

 <!-- Top Frame -->
<div id="top-frame" style="
    height:100vh;
    background:black;
    position:relative;
">
    <iframe src="/web/stream.html"
            style="width:100%; height:100%; border:none;"></iframe>

    <!-- Floating Toggle -->
    <div id="floating-toggle"
        onclick="toggleBottomFrame()"
        style="
            position:absolute;
            bottom:10px;
            left:50%;
            transform:translateX(-50%);
            background:#0a84ff;
            color:white;
            padding:8px 14px;
            border-radius:20px;
            font-size:14px;
            cursor:pointer;
            user-select:none;
            opacity:0.9;
        ">
        Type Text
    </div>
</div>

<!-- Bottom Frame -->
<div id="bottom-frame" style="
    height:25vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#222;
">

    <textarea id="pad-text"
        placeholder="Enter text..."
        style="
            width:95%;
            height:70%;
            resize:none;
            border-radius:8px;
            border:none;
            padding:10px;
            font-size:16px;
            box-sizing:border-box;
        "></textarea>

    <button onclick="submitPadText()"
        style="
            margin-top:10px;
            border:none;
            left:50%;
            transform:translateX(-50%);
            background:#0a84ff;
            color:white;
            padding:8px 14px;
            border-radius:20px;
            font-size:14px;
            font-weight:bold;
        ">
        Submit
    </button>
</div>   

<script>
let lastResponse = "";
// Keep only WebSocket required for text submission
const ws = new WebSocket("wss://" + location.host + "/ws");

function toggleBottomFrame() {
    const bottom = document.getElementById("bottom-frame");
    const top = document.getElementById("top-frame");
    const toggle = document.getElementById("floating-toggle");

    if (bottom.style.display === "none") {
        // SHOW bottom frame
        bottom.style.display = "flex";
        top.style.height = "75vh";
        toggle.textContent = "Hide Text";
    } else {
        // HIDE bottom frame
        bottom.style.display = "none";
        top.style.height = "100vh";
        toggle.textContent = "Type Text";
    }
}

function submitPadText() {
    const text = document.getElementById("pad-text").value;
    // 🔴 Open window during user click (important for Safari)
    popupWindow = window.open("", "_blank");
    const script = popupWindow.document.createElement("script");
    script.src = "/static/marked.min.js";  // adjust path if needed
    popupWindow.document.head.appendChild(script);

    console.log("Submitted:", text);

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            action: "text_submit",
            value: text
        }));
    }

    document.getElementById("pad-text").value = "";
    // Basic loading UI
    popupWindow.document.body.innerHTML = `
        <div style="font-family:sans-serif; padding:20px;">
            <div>Waiting for response...</div>
        </div>
    `;
}

ws.onmessage = (event) => {
    lastResponse = event.data;

    if (popupWindow) {

 // Build clean HTML (NO script tags here)
    popupWindow.document.body.innerHTML = `
        <div style="font-family:sans-serif; padding:20px;">
            <div id="content"
                 style="margin-bottom:20px; word-wrap:break-word;">
            </div>

            <button id="copyBtn"
                style="
                    width:100%;
                    height:50px;
                    border:none;
                    border-radius:10px;
                    background:#0a84ff;
                    color:white;
                    font-size:18px;
                    font-weight:bold;
                ">
                Copy
            </button>
        </div>
    `;

    const contentDiv = popupWindow.document.getElementById("content");

    // ✅ If marked.js is loaded → use it
    if (popupWindow.marked) {
        contentDiv.innerHTML = popupWindow.marked.parse(lastResponse);
    } else {
        // fallback (plain text)
        contentDiv.innerText = lastResponse;
    }
    }
};

</script>

</body>
</html>
